openapi: 3.1.0
info:
  title: Deadman Agent
  version: 0.1.0
  description: 'Deadman Agent HTTP API。


    聊天接口使用模块化 system prompt：**Core + Module（scene）+ Knobs（语言/语气/受众）+ Context（RAG 参考材料）**。详见 ``app/core/agent/prompt/ARCHITECTURE.md``。


    Tool Agent（``POST /chat/agent``）见 ``app/core/agent/ARCHITECTURE.md``。'
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      description: "检查应用的健康状态\n\nReturns:\n    健康检查数据"
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_HealthData_'
  /chat:
    post:
      tags:
      - chat
      summary: Chat
      description: '发送用户消息并返回**整段**模型回复（JSON）。


        请求体为 ``ChatRequest``：``scene`` 选择 manifest 场景（``default`` / ``rag_qa`` / ``customer_support``）；``output_language``、``tone``、``audience``
        控制旋钮；``context`` 传入 RAG 参考材料（单独 system 层，非流式与流式共用）。


        使用 ``session_id`` 区分多轮会话历史。流式输出请用 ``/chat/stream``。'
      operationId: chat_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples: &id001
              general:
                summary: 通用对话
                value:
                  session_id: sess-1
                  user_input: 你好
                  scene: default
                  output_language: 简体中文
                  tone: 正式
                  audience: 普通用户
              rag:
                summary: RAG 问答
                value:
                  session_id: sess-1
                  user_input: 如何退款？
                  scene: rag_qa
                  output_language: 简体中文
                  tone: 简洁
                  context: 文档：7 日内可申请退款。
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ChatReplyData_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/stream:
    post:
      tags:
      - chat
      summary: Chat stream (SSE, POST)
      description: '与 GET 语义相同，**请求体为 ``ChatRequest``**（推荐携带 ``context``）。


        ``EventSource`` 仅支持 GET；POST 请用 ``fetch`` + ``ReadableStream`` 解析 SSE。'
      operationId: chat_stream_post_chat_stream_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples: *id001
      responses:
        '200':
          description: 同 GET /chat/stream
          headers:
            Cache-Control:
              schema:
                type: string
              description: '``no-cache``'
            Connection:
              schema:
                type: string
              description: '``keep-alive``'
            X-Accel-Buffering:
              schema:
                type: string
              description: '``no``（减轻 Nginx 等对响应的缓冲）'
          content:
            text/event-stream:
              schema:
                type: string
                description: 'SSE 文本流。每行 ``data:`` 后为 JSON，类型见 ``ChatStreamTokenEvent`` / ``ChatStreamDoneEvent``
                  / ``ChatStreamErrorEvent``；流结束前追加 ``data: [DONE]``。'
              example: 'data: {"type":"token","delta":"你"}


                data: {"type":"token","delta":"好"}


                data: {"type":"done"}


                data: [DONE]


                '
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - chat
      summary: Chat stream (SSE, GET)
      description: '使用 **Server-Sent Events**（``text/event-stream``）流式返回增量，适合浏览器 ``EventSource``（仅支持 GET）。


        Query 参数与 ``ChatRequest`` 字段一致；超长 ``context`` 建议用 POST。


        **帧格式**：``data: {"type":"token","delta":"..."}``；结束 ``{"type":"done"}``；随后 ``data: [DONE]``；异常
        ``{"type":"error","message":"..."}``。'
      operationId: chat_stream_get_chat_stream_get
      parameters:
      - name: session_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: 会话 ID
          title: Session Id
        description: 会话 ID
      - name: user_input
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: 用户输入
          title: User Input
        description: 用户输入
      - name: scene
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Scene'
          description: prompt 场景
          default: default
        description: prompt 场景
      - name: output_language
        in: query
        required: false
        schema:
          enum:
          - 简体中文
          - English
          type: string
          description: 输出语言
          default: 简体中文
          title: Output Language
        description: 输出语言
      - name: tone
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Tone'
          description: 语气
          default: 正式
        description: 语气
      - name: audience
        in: query
        required: false
        schema:
          type: string
          maxLength: 32
          description: 受众
          default: 普通用户
          title: Audience
        description: 受众
      - name: context
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 32000
          - type: 'null'
          description: RAG 参考材料
          title: Context
        description: RAG 参考材料
      - name: include_few_shot
        in: query
        required: false
        schema:
          type: boolean
          description: 是否插入 Few-shot（仅 default 场景）
          default: true
          title: Include Few Shot
        description: 是否插入 Few-shot（仅 default 场景）
      responses:
        '200':
          description: SSE 字节流
          headers:
            Cache-Control:
              schema:
                type: string
              description: '``no-cache``'
            Connection:
              schema:
                type: string
              description: '``keep-alive``'
            X-Accel-Buffering:
              schema:
                type: string
              description: '``no``（减轻 Nginx 等对响应的缓冲）'
          content:
            text/event-stream:
              schema:
                type: string
                description: 'SSE 文本流。每行 ``data:`` 后为 JSON，类型见 ``ChatStreamTokenEvent`` / ``ChatStreamDoneEvent``
                  / ``ChatStreamErrorEvent``；流结束前追加 ``data: [DONE]``。'
              example: 'data: {"type":"token","delta":"你"}


                data: {"type":"token","delta":"好"}


                data: {"type":"done"}


                data: [DONE]


                '
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/agent:
    post:
      tags:
      - chat-agent
      summary: Chat Agent
      description: 'Tool Agent：**bind_tools** 驱动设备操作（如 ``control_light``），参数由工具 Pydantic schema 约束，不在
        prompt 里写 JSON。


        与 ``POST /chat`` 共用 ``session_id`` 历史存储；消息拼装与降级见 ``app/core/agent/ARCHITECTURE.md``。


        **降级**：``enable_tools=false``、bind 失败、模型循环失败或达到工具轮次上限时 ``degraded=true``、``mode=chat_fallback``。半途失败会保留
        ``partial_turn`` 写入历史后再做无工具总结。


        响应：``tool_trace``、``degradation_reason``、``retryable``。'
      operationId: chat_agent_chat_agent_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
            examples:
              smart_home:
                summary: 智能家居关灯
                value:
                  session_id: sess-agent-1
                  user_input: 帮我把客厅灯关了
                  scene: smart_home
                  output_language: 简体中文
                  tone: 正式
              tools_off:
                summary: 禁用工具（plain chat 降级）
                value:
                  session_id: sess-agent-2
                  user_input: 你好
                  scene: smart_home
                  enable_tools: false
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AgentChatReplyData_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/sessions:
    get:
      tags:
      - chat-history
      summary: List Chat Sessions
      description: 分页列出已有聊天会话（扫描 ``data/history/*_messages.json``），按文件修改时间倒序。
      operationId: list_chat_sessions_chat_sessions_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: 页码，从 1 开始
          default: 1
          title: Page
        description: 页码，从 1 开始
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: 每页条数，最大 100
          default: 20
          title: Page Size
        description: 每页条数，最大 100
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ChatSessionsPageData_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/sessions/{session_id}/messages:
    get:
      tags:
      - chat-history
      summary: List Chat Messages
      description: 分页查询指定 ``session_id`` 的聊天消息（磁盘全量 JSON，非模型上下文截断视图）。
      operationId: list_chat_messages_chat_sessions__session_id__messages_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: 页码，从 1 开始
          default: 1
          title: Page
        description: 页码，从 1 开始
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: 每页条数，最大 100
          default: 20
          title: Page Size
        description: 每页条数，最大 100
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ChatMessagesPageData_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/prompt/meta:
    get:
      tags:
      - prompt
      summary: Get Chat Prompt Meta
      description: 返回当前加载的 Prompt 资产包版本（prompt_version、pack_format、scene 列表），用于 A/B 记录与回滚对照。与 pyproject
        应用版本分离。
      operationId: get_chat_prompt_meta_chat_prompt_meta_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_PromptPackMetaData_'
components:
  schemas:
    AgentChatReplyData:
      properties:
        role:
          type: string
          title: Role
          description: 消息角色
          default: assistant
        content:
          type: string
          title: Content
          description: 面向用户的最终回复
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          description: 模型名称
        finish_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Finish Reason
          description: 结束原因
        scene:
          anyOf:
          - type: string
          - type: 'null'
          title: Scene
          description: prompt 场景
        output_language:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Language
        tone:
          anyOf:
          - type: string
          - type: 'null'
          title: Tone
        mode:
          $ref: '#/components/schemas/AgentMode'
          description: 实际消费路径：tool_agent 或 chat_fallback
        degraded:
          type: boolean
          title: Degraded
          description: 是否发生降级
        degradation_reason:
          $ref: '#/components/schemas/DegradationReason'
          description: 降级原因
        retryable:
          type: boolean
          title: Retryable
          description: 是否建议在业务层重试（如限流、超时、网关错误）
          default: false
        tool_trace:
          items:
            $ref: '#/components/schemas/ToolTraceRecord'
          type: array
          title: Tool Trace
          description: 工具调用轨迹
      type: object
      required:
      - content
      - mode
      - degraded
      - degradation_reason
      title: AgentChatReplyData
      description: Tool Agent 回复（含降级与工具轨迹）。
    AgentChatRequest:
      properties:
