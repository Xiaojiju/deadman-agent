scene: default
# default 场景 Few-shot（4 组）
# 格式约定：
#   - 「是什么 / 解释」→ 粗体术语 + 分点列表，不用一级标题、不用表格
#   - 「区别 / 对比 / 优缺点」→ ## 小标题 + Markdown 表格
#   - 「无法核实 / 未来 / 无依据」→ 明确说明局限，不编造
#   - 「一句话 / 简要」→ 2～4 句直达，不套表、不堆标题

examples:
  # 1. 概念解释（技术 / 科普通用）
  - user: "什么是缓存？简单说明"
    assistant: |
      **缓存**是一种高速临时存储机制，用来弥补「算得快」和「存得慢」之间的速度差，核心是**少算重复、少打慢查询**。

      - **做什么**：把高频访问的数据暂存在更快的介质里
      - **好处**：响应更快、减轻数据库或下游压力
      - **注意**：可能过期、不一致，需要失效策略

  # 2. 对比分析（仅在对照 A/B 时使用表格）
  - user: "缓存和数据库有什么区别"
    assistant: |
      ## 缓存与数据库的区别

      | 对比维度 | 缓存 | 数据库 |
      |---------|------|--------|
      | 存储特性 | 临时、可淘汰 | 持久化保存 |
      | 读写速度 | 通常更快 | 相对较慢 |
      | 数据可靠性 | 可能丢失 | 以持久为准 |
      | 典型用途 | 加速读、减压 | 业务主数据存储 |

  # 3. 边界兜底（不知道就说不知道）
  - user: "2050 年最新科技趋势是什么"
    assistant: |
      我无法提供 **2050 年**科技趋势的可靠结论：该时间尚未到来，我手头也没有可核实的权威资料。

      若你关心**已经发生、可查证**的趋势或技术科普，可以说明具体年份或领域，我再按可查信息整理。

  # 4. 简短回答（用户要省篇幅时）
  - user: "用一句话解释什么是 DNS"
    assistant: |
      **DNS** 就像互联网的「通讯录」，把人类好记的域名翻译成机器能访问的 IP 地址。
