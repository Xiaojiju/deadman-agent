        status:
          type: string
          enum:
          - ok
          - error
          - warning
          title: Status
          description: 状态
        version:
          type: string
          title: Version
          description: 版本
      type: object
      required:
      - status
      - version
      title: HealthData
      description: 健康检查数据
    PaginationMeta:
      properties:
        page:
          type: integer
          title: Page
          description: 当前页码，从 1 开始
        page_size:
          type: integer
          title: Page Size
          description: 每页条数
        total:
          type: integer
          title: Total
          description: 总条数
        total_pages:
          type: integer
          title: Total Pages
          description: 总页数
      type: object
      required:
      - page
      - page_size
      - total
      - total_pages
      title: PaginationMeta
      description: 分页元数据。
    PromptPackMetaData:
      properties:
        prompt_version:
          type: string
          title: Prompt Version
          description: Prompt 文案版本，见 prompt/CHANGELOG.md
        prompt_pack_format:
          type: integer
          title: Prompt Pack Format
          description: Prompt 契约格式版本
        supported_pack_format:
          type: integer
          title: Supported Pack Format
          description: 当前应用代码支持的 format
        app_compat_min:
          type: string
          title: App Compat Min
          description: manifest 声明的建议最低应用版本
        scene_ids:
          items:
            type: string
          type: array
          title: Scene Ids
          description: manifest 中已配置的场景 ID
        app_version:
          type: string
          title: App Version
          description: 当前运行的应用版本（pyproject）
        changelog_path:
          type: string
          title: Changelog Path
          description: 变更日志相对仓库路径
          default: app/core/agent/prompt/CHANGELOG.md
      type: object
      required:
      - prompt_version
      - prompt_pack_format
      - supported_pack_format
      - app_compat_min
      - scene_ids
      - app_version
      title: PromptPackMetaData
      description: 当前加载的 Prompt 资产包元数据。
    Scene:
      type: string
      enum:
      - default
      - rag_qa
      - customer_support
      - smart_home
      title: Scene
      description: '业务场景，对应 ``manifest.yaml`` 中的 ``scenes`` 键。


        每个成员决定在组装时追加哪些 ``modules/*.md`` 片段。'
    Tone:
      type: string
      enum:
      - 正式
      - 简洁
      - 友好
      - 专业
      title: Tone
      description: '语气白名单。


        限制为枚举值，避免将用户任意输入直接拼进 system，降低 prompt 注入风险。'
    ToolTraceRecord:
      properties:
        tool:
          type: string
          title: Tool
        args:
          additionalProperties: true
          type: object
          title: Args
        result:
          anyOf:
          - additionalProperties: true
            type: object
          - type: string
          title: Result
        ok:
          type: boolean
          title: Ok
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - tool
      - args
      - result
      - ok
      title: ToolTraceRecord
      description: API 暴露的工具调用轨迹。
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ChatStreamTokenEvent:
      type: object
      description: SSE 正文增量事件。
      required:
      - type
      - delta
      properties:
        type:
          type: string
          const: token
        delta:
          type: string
          description: 本帧 UTF-8 文本片段
    ChatStreamDoneEvent:
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: done
    ChatStreamErrorEvent:
      type: object
      required:
      - type
      - message
      properties:
        type:
          type: string
          const: error
        message:
          type: string
tags:
- name: health
  description: 健康检查
- name: chat
