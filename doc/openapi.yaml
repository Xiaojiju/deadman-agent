          description: 回复语气
          default: 正式
        audience:
          type: string
          maxLength: 32
          title: Audience
          description: 目标受众
          default: 普通用户
        context:
          anyOf:
          - type: string
            maxLength: 32000
          - type: 'null'
          title: Context
          description: 可选参考材料（第二条 system）
        enable_tools:
          type: boolean
          title: Enable Tools
          description: 是否启用工具；False 时直接走普通对话降级路径
          default: true
      type: object
      required:
      - session_id
      - user_input
